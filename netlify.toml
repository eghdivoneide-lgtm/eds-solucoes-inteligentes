# Publicação na Netlify — site estático, sem build.
[build]
  publish = "."
  command = ""

# Cabeçalhos de segurança e cache para assets estáticos.
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "SAMEORIGIN"
    Referrer-Policy = "strict-origin-when-cross-origin"

# CSS e JS são editados com frequência: sempre revalidar (304 se não mudou).
[[headers]]
  for = "/assets/css/*"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/assets/js/*"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Imagens não mudam de conteúdo: cache longo.
[[headers]]
  for = "/assets/img/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
